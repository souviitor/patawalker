version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: patawalker_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: dogwalker_db
      POSTGRES_USER: dogwalker_user
      POSTGRES_PASSWORD: dogwalker_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: patawalker_web
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://dogwalker_user:dogwalker_pass@db:5432/dogwalker_db
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
      MP_PUBLIC_KEY: ${MP_PUBLIC_KEY:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@patawalker.com.br}
    volumes:
      - ./static/uploads:/app/static/uploads
    ports:
      - "5000:5000"

volumes:
  postgres_data:
